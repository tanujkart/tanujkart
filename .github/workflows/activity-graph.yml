name: Contribution Activity Graph

on:
  schedule:
    - cron: "7 */12 * * *"   # every 12 hours
  workflow_dispatch:           # allow manual runs

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate activity.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_LOGIN: ${{ github.repository_owner }}
          DAYS: "30"
          OUT: activity.svg
        run: python scripts/gen_activity.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add activity.svg
          if git diff --cached --quiet; then
            echo "activity.svg unchanged — nothing to commit"
          else
            git commit -m "chore: refresh contribution activity graph"
            git push
          fi
